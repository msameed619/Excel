<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Kimi-Pro Excel Engine</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #107c41; 
      --bg: #f3f4f6;
      --chat-bg: #ffffff;
      --border: #e5e7eb;
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --thinking-bg: #f9fafb;
      --user-bubble: #dcfce7;
    }
    
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      margin: 0; background: var(--bg); display: flex; flex-direction: column; height: 100vh; font-size: 13px;
    }
    
    .header { 
      background: #111827; color: white; padding: 12px 15px; font-weight: 600; display: flex; align-items: center; justify-content: space-between;
    }

    #chat-container { 
      flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; 
    }
    
    .bubble { max-width: 90%; padding: 10px; border-radius: 8px; line-height: 1.5; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .user { align-self: flex-end; background: var(--user-bubble); color: #064e3b; }
    .ai { align-self: flex-start; background: white; border: 1px solid var(--border); }

    .thinking-container {
      background: var(--thinking-bg);
      border-left: 3px solid #9ca3af;
      margin-bottom: 8px;
      padding: 8px;
      border-radius: 4px;
      font-style: italic;
      color: var(--text-muted);
      font-size: 12px;
    }

    .task-card { 
      background: #f8fafc; border: 1px solid var(--border); border-left: 4px solid var(--primary); 
      padding: 10px; margin-top: 10px; border-radius: 4px;
    }
    
    .btn-run { 
      background: var(--primary); color: white; border: none; padding: 8px; width: 100%; 
      border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 5px;
    }

    .footer { padding: 10px; background: white; border-top: 1px solid var(--border); }
    .input-wrapper { display: flex; background: #f3f4f6; border-radius: 20px; padding: 5px 12px; align-items: center; gap: 8px; }
    
    textarea { 
      flex-grow: 1; border: none; background: transparent; outline: none; resize: none; height: 20px; max-height: 100px;
    }

    #loader { 
      display: none; padding: 8px; color: var(--primary); font-size: 12px; text-align: center; background: #ecfdf5; 
    }
  </style>
</head>
<body>

  <div class="header">
    <span><i class="fas fa-robot"></i> KIMI-PRO ENGINE</span>
    <button id="clear-btn" style="background:none; border:none; color:gray; cursor:pointer;" title="Clear Memory"><i class="fas fa-trash"></i></button>
  </div>

  <div id="chat-container">
    <div class="bubble ai">I'm connected to your Kaggle Agent. Send a request to begin live editing.</div>
  </div>

  <div id="loader"><i class="fas fa-sync fa-spin"></i> Agent is thinking...</div>

  <div class="footer">
    <div class="input-wrapper">
      <textarea id="user-input" placeholder="Type a request..."></textarea>
      <i id="send-btn" class="fas fa-paper-plane" style="color:var(--primary); cursor:pointer;"></i>
    </div>
  </div>

  <script>
    // UPDATE THIS URL FROM KAGGLE EVERY TIME YOU RESTART
    const KAGGLE_URL = "https://able-pieces-eng-jobs.trycloudflare.com"; 
    
    const sessionId = "session_" + Math.random().toString(36).substr(2, 9);

    Office.onReady((info) => {
      if (info.host === Office.HostType.Excel) {
        document.getElementById('send-btn').onclick = send;
        document.getElementById('clear-btn').onclick = () => location.reload();
        document.getElementById("user-input").onkeydown = (e) => { 
            if(e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
        };
      }
    });

    async function send() {
      const input = document.getElementById('user-input');
      const prompt = input.value.trim();
      if (!prompt) return;

      appendMsg('user', prompt);
      input.value = "";
      updateLoader(true);

      try {
        await Excel.run(async (context) => {
          const sheet = context.workbook.worksheets.getActiveWorksheet();
          
          // FIX: Explicitly load 'name' and 'UsedRange' properties
          sheet.load("name"); 
          const usedRange = sheet.getUsedRange();
          usedRange.load(["address", "values"]); 
          
          // CRITICAL: Must sync before accessing sheet.name
          await context.sync();

          const excelContext = {
            activeSheet: sheet.name,
            range: usedRange.address,
            headers: usedRange.values[0] || [],
            dataPreview: usedRange.values.slice(1, 6)
          };

          const payload = {
            "session_id": sessionId,
            "prompt": prompt,
            "excel_context": JSON.stringify(excelContext)
          };

          const response = await fetch(`${KAGGLE_URL}/generate`, {
            method: "POST",
            headers: { "Content-Type": "application/json", "cf-bypass-tunnel-reminder": "true" },
            body: JSON.stringify(payload)
          });

          const data = await response.json();
          pollStatus(data.task_id);
        });
      } catch (err) {
        updateLoader(false);
        appendMsg('ai', "Excel Connection Error: " + err.message);
      }
    }

    async function pollStatus(taskId) {
      try {
        const res = await fetch(`${KAGGLE_URL}/status/${taskId}`, { 
            headers: { "cf-bypass-tunnel-reminder": "true" } 
        });
        const data = await res.json();

        if (data.status === "completed") {
          updateLoader(false);
          renderAiResponse(data.response);
        } else if (data.status === "failed") {
          updateLoader(false);
          appendMsg('ai', "Agent Logic Error: " + data.error);
        } else {
          // Poll every 3 seconds
          setTimeout(() => pollStatus(taskId), 3000);
        }
      } catch (e) {
          console.log("Polling...");
          setTimeout(() => pollStatus(taskId), 3000);
      }
    }

    function renderAiResponse(fullText) {
      const container = document.getElementById('chat-container');
      const bubble = document.createElement('div');
      bubble.className = "bubble ai";

      // 1. Render Thinking Box
      const thinkMatch = fullText.match(/<think>([\s\S]*?)<\/think>/i);
      if (thinkMatch) {
        const thinkDiv = document.createElement('div');
        thinkDiv.className = "thinking-container";
        thinkDiv.innerHTML = `<i class="fas fa-brain"></i> Thinking: ${thinkMatch[1].trim()}`;
        bubble.appendChild(thinkDiv);
      }

      // 2. Render Clean Text
      let cleanText = fullText.replace(/<think>[\s\S]*?<\/think>/i, "").replace(/\[START\][\s\S]*?\[END\]/gi, "").trim();
      if (cleanText) {
        const textDiv = document.createElement('div');
        textDiv.innerHTML = cleanText.replace(/\n/g, "<br>");
        bubble.appendChild(textDiv);
      }

      // 3. Render Action Card
      const codeMatch = /\[START\]([\s\S]*?)\[END\]/gi.exec(fullText);
      if (codeMatch) {
        const code = codeMatch[1].trim();
        const card = document.createElement('div');
        card.className = "task-card";
        card.innerHTML = `
          <div style="font-weight:bold; color:var(--primary); font-size:11px; margin-bottom:5px;">AI ACTION READY</div>
          <button class="btn-run" id="apply-code-btn">Apply to Sheet</button>
        `;
        card.querySelector('#apply-code-btn').onclick = () => executeExcelCode(code, card.querySelector('#apply-code-btn'));
        bubble.appendChild(card);
      }

      container.appendChild(bubble);
      container.scrollTop = container.scrollHeight;
    }

    async function executeExcelCode(code, btn) {
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Running...';
      try {
        await Excel.run(async (context) => {
          // Create an async function from the AI code
          const func = new Function('context', `return (async function(context){ ${code} })(context);`);
          await func(context);
          await context.sync();
          btn.innerHTML = '<i class="fas fa-check"></i> Applied Successfully';
          btn.style.background = "#059669";
        });
      } catch (err) {
        btn.innerHTML = '<i class="fas fa-times"></i> Logic Error';
        appendMsg('ai', "Code Execution Error: " + err.message);
      }
    }

    function appendMsg(role, text) {
      const div = document.createElement('div');
      div.className = `bubble ${role}`;
      div.innerText = text;
      document.getElementById('chat-container').appendChild(div);
      document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
    }

    function updateLoader(show) { document.getElementById('loader').style.display = show ? "block" : "none"; }
  </script>
</body>
</html>
